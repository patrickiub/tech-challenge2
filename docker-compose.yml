services:
  mysql:
    image: mysql:8.0
    container_name: techchallenge2-mysql
    environment:
      MYSQL_DATABASE: techchallenge2
      MYSQL_USER: fiap
      MYSQL_PASSWORD: fiap123
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "fiap", "-pfiap123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: techchallenge2-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/techchallenge2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: fiap
      DB_PASSWORD: fiap123
      DDL_AUTO: update
      JPA_SHOW_SQL: "false"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
